# Local dev profile ($0). Postgres + MinIO started by `make dev` (docker-compose).
spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/snow_resorts?currentSchema=users
    username: snow
    password: snow

snow:
  storage:
    # LAN IP so physical devices can PUT/GET avatars (same host as EXPO_PUBLIC_API_BASE_URL).
    # Override with AVATAR_PUBLIC_BASE_URL / S3_ENDPOINT if your Mac IP differs.
    public-base-url: ${AVATAR_PUBLIC_BASE_URL:http://192.168.3.18:9000/snow-resorts-assets}
    s3:
      endpoint: ${S3_ENDPOINT:http://192.168.3.18:9000}
      region: us-east-1
      access-key: minioadmin
      secret-key: minioadmin
      path-style-access: true

logging:
  level:
    com.snowresorts.user: DEBUG
