spring:
  application:
    name: user-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/snow_resorts?currentSchema=users}
    username: ${DB_USER:snow}
    password: ${DB_PASSWORD:snow}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: users
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: users
    default-schema: users
    create-schemas: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8081/.well-known/jwks.json}

server:
  port: ${SERVER_PORT:8082}
  forward-headers-strategy: framework

snow:
  # Shared resource-server chain protects every endpoint (validate JWTs, never issue them).
  security:
    enabled: true
    public-paths:
      - /snow-resort-service/v1/users/internal/**
    cors:
      allowed-origins:
        - ${CORS_ALLOWED_ORIGIN:http://localhost:8080}
  internal-api:
    secret: ${INTERNAL_API_SECRET:dev-internal-secret}
    header: X-Internal-Secret
  storage:
    bucket: ${AVATAR_BUCKET:snow-resorts-assets}
    public-base-url: ${AVATAR_PUBLIC_BASE_URL:http://localhost:9000/snow-resorts-assets}
    presign-ttl: 10m
    max-avatar-bytes: 2097152
    s3:
      endpoint: ${S3_ENDPOINT:}
      region: ${AWS_REGION:us-east-1}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      path-style-access: ${S3_PATH_STYLE:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.snowresorts.user: INFO
